<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skybird — Travel Agency</title>
<link rel="stylesheet" href="css/app.css" />
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-view" class="hidden auth-shell">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-logo">✈</div>
      <h1>Skybird</h1>
      <p class="muted">Travel agency management</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="login">Sign in</button>
      <button class="tab" data-tab="register">Create account</button>
    </div>
    <form id="form-login" class="form">
      <label>Email</label><input type="email" name="email" required autocomplete="email" />
      <label>Password</label><input type="password" name="password" required autocomplete="current-password" />
      <button class="btn-primary" type="submit">Sign in</button>
      <p id="login-error" class="error"></p>
    </form>
    <form id="form-register" class="form hidden">
      <label>Full name</label><input name="name" required />
      <label>Email</label><input type="email" name="email" required />
      <label>Password</label><input type="password" name="password" required minlength="6" />
      <p class="muted small">First account becomes admin. Others default to salesman with limited access — admin can grant more in Staff page.</p>
      <button class="btn-primary" type="submit">Create account</button>
      <p id="register-error" class="error"></p>
    </form>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-view" class="hidden app-shell">
  <aside class="sidebar">
    <div class="brand-mini">
      <span class="brand-logo">✈</span>
      <span id="agency-name">Skybird</span>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">?</div>
        <div>
          <div id="user-name" class="user-name">—</div>
          <div id="user-role" class="user-role">—</div>
        </div>
      </div>
      <button id="btn-logout" class="btn-ghost">Sign out</button>
    </div>
  </aside>
  <main class="main">
    <div id="route"></div>
  </main>
</div>

<div id="toast-stack"></div>

<!-- modal root -->
<div id="modal-root"></div>

<script src="js/api.js"></script>
<script src="js/format.js"></script>
<script src="js/airlines.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/pdf.js"></script>
<script src="js/ui.js"></script>
<script src="js/store.js"></script>
<script src="js/auth.js"></script>
<script src="js/router.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/tickets.js"></script>
<script src="js/pages/customers.js"></script>
<script src="js/pages/suppliers.js"></script>
<script src="js/pages/sub-agents.js"></script>
<script src="js/pages/payments.js"></script>
<script src="js/pages/refunds.js"></script>
<script src="js/pages/cash-book.js"></script>
<script src="js/pages/reports.js"></script>
<script src="js/pages/staff.js"></script>
<script src="js/pages/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
